<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BladeUp Barber Basel</title>

<style>

body{
font-family:Arial;
background:black;
color:white;
text-align:center;
margin:0;
}

header{
background:#111;
padding:20px;
}

h1{
color:#FFD700;
}

.container{
padding:30px;
}

select,input{
padding:10px;
margin:10px;
width:250px;
}

button{
background:#FFD700;
border:none;
padding:15px;
font-size:16px;
cursor:pointer;
}

.lang{
position:absolute;
top:20px;
right:20px;
}

</style>
</head>

<body>

<div class="lang">
<select onchange="changeLang(this.value)">
<option value="de">Deutsch</option>
<option value="es">Español</option>
</select>
</div>

<header>
<h1>BladeUp Barber</h1>
<p id="subtitle">Moderne Haarschnitte für Männer in Basel</p>
</header>

<div class="container">

<h2 id="bookingTitle">Termin buchen</h2>

<div>
<label id="barberLabel">Barbier wählen</label><br>
<select id="barber">
<option>Jhay Sánchez</option>
</select>
</div>

<div>
<label id="serviceLabel">Service wählen</label><br>
<select id="service">
<option>Haarschnitt</option>
<option>Haarschnitt + Bart</option>
<option>Bart</option>
<option>Kinderhaarschnitt</option>
<option>Beratung</option>
</select>
</div>

<div>
<label id="dateLabel">Datum wählen</label><br>
<input type="date" id="date">
</div>

<div>
<label id="timeLabel">Uhrzeit wählen</label><br>
<input type="time" id="time">
</div>

<br>

<button onclick="sendWhatsApp()" id="bookBtn">
Termin über WhatsApp buchen
</button>

</div>

<script>

function sendWhatsApp(){

let barber=document.getElementById("barber").value;
let service=document.getElementById("service").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;

let msg=`Hallo! Ich möchte einen Termin buchen.%0A
Barbier: ${barber}%0A
Service: ${service}%0A
Datum: ${date}%0A
Uhrzeit: ${time}`;

let phone="41779621095";

window.open(`https://wa.me/${phone}?text=${msg}`,"_blank");

}

function changeLang(lang){

if(lang=="es"){

document.getElementById("subtitle").innerText="Cortes modernos para hombres en Basel";
document.getElementById("bookingTitle").innerText="Reservar cita";
document.getElementById("barberLabel").innerText="Elegir barbero";
document.getElementById("serviceLabel").innerText="Elegir servicio";
document.getElementById("dateLabel").innerText="Elegir fecha";
document.getElementById("timeLabel").innerText="Elegir hora";
document.getElementById("bookBtn").innerText="Reservar por WhatsApp";

}

if(lang=="de"){

document.getElementById("subtitle").innerText="Moderne Haarschnitte für Männer in Basel";
document.getElementById("bookingTitle").innerText="Termin buchen";
document.getElementById("barberLabel").innerText="Barbier wählen";
document.getElementById("serviceLabel").innerText="Service wählen";
document.getElementById("dateLabel").innerText="Datum wählen";
document.getElementById("timeLabel").innerText="Uhrzeit wählen";
document.getElementById("bookBtn").innerText="Termin über WhatsApp buchen";

}

}

</script>

</body>
</html>
